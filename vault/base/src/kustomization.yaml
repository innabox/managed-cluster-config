apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vault

resources:
- namespace.yaml

helmCharts:
  - name: vault
    namespace: vault
    repo: https://helm.releases.hashicorp.com
    version: 0.30.0
    includeCRDs: true
    skipTests: true
    releaseName: vault
    valuesFile: values.yaml
